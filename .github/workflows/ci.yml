name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Server tests
        run: npm run test --workspace flipblog-server

      - name: Build front-end
        run: npm run build

      - name: Web tests
        run: npm run test --workspace flipblog-web
